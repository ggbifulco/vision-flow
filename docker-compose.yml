services:
  visionflow:
    build: .
    container_name: visionflow
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./outputs:/app/outputs
      - yolo_cache:/home/appuser/.config/Ultralytics
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # WEBCAM (Linux only) — uncomment to pass USB webcam into Docker
    # devices:
    #   - "/dev/video0:/dev/video0"
    # group_add:
    #   - video

volumes:
  yolo_cache:
